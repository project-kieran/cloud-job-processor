name: basic-ci
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
            
            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                node-version: '24'  
            
            - name: Install dependencies
              run: npm ci
            
            - name: Run tests
              run: npm test

            - name: Build TS project
              run: npm run build